<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>QQ糖桌宠</title>
  <link rel="stylesheet" href="./renderer/style.css" />
</head>
<body>
  <div id="stage" class="stage">
    <!-- 像素史莱姆：canvas 由 sprite.js 注入 -->
    <div id="pet" class="pet state-idle">
      <div class="pet-shadow"></div>
      <div class="pet-body">
        <!-- <canvas class="pet-canvas"> 由 Sprite 动态插入 -->
        <div class="pet-overlay"></div>
      </div>
    </div>

    <!-- 气泡 -->
    <div id="bubble" class="bubble hidden">
      <div class="bubble-text"></div>
      <div class="bubble-tail"></div>
    </div>
  </div>

  <script src="./renderer/sprite.js"></script>
  <script src="./renderer/bubble.js"></script>
  <script src="./renderer/drag.js"></script>
  <script src="./renderer/pet.js"></script>
</body>
</html>
